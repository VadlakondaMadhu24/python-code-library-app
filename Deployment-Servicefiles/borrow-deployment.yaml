---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: borrow-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: borrow

  template:
    metadata:
      labels:
        app: borrow

    spec:
      containers:
      - name: borrow-container
        image: vadlakondadocker24/mcaregistry:borrowimage
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: mysql-service

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: root
